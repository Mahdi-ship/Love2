<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Heart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let W, H, CX, CY, SCALE;
        const DPR = Math.min(window.devicePixelRatio || 1, 2);
        const text = "I love you";
        const points = [];
        const TOTAL = 100;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * DPR;
            canvas.height = H * DPR;
            canvas.style.width = W + "px";
            canvas.style.height = H + "px";
            ctx.scale(DPR, DPR);
            CX = W / 2;
            CY = H / 2 + 20;
            SCALE = Math.min(W, H) * 0.015;
            buildPoints();
        }

        function heart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * SCALE, y: -y * SCALE };
        }

        function buildPoints() {
            points.length = 0;
            for (let i = 0; i < TOTAL; i++) {
                const t = (i / TOTAL) * Math.PI * 2;
                points.push({ baseT: t, phase: Math.random() * Math.PI * 2 });
            }
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, W, H);
            const time = Date.now() * 0.002;
            points.forEach(p => {
                const s = Math.sin(time + p.phase) * 0.2 + 1;
                const pos = heart(p.baseT);
                ctx.save();
                ctx.translate(CX + pos.x * s, CY + pos.y * s);
                ctx.rotate(p.baseT + Math.PI / 2);
                ctx.shadowColor = "#ff78be";
                ctx.shadowBlur = 10;
                ctx.fillStyle = "#ff78be";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(text, 0, 0);
                ctx.restore();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        draw();
    </script>
</body>
</html>
